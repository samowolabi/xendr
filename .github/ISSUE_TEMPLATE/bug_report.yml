name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Share a minimal reproduction, code snippet, or steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Xendr version
      placeholder: "0.1.10"
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: "18.3.1 or 19.2.7"
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 126 on macOS"
