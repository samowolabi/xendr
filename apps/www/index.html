                "@type": "Question",
                "name": "What is Xendr?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Xendr is a lightweight API tester you can embed in developer documentation, websites, and guides. It lets developers test requests where the API is documented instead of copying cURL into another tool."
                }
              },
              {
                "@type": "Question",
                "name": "Where can I embed Xendr?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "You can embed Xendr in developer docs, product websites, API guides, and internal portals. React apps can use @xendr/react directly, and other sites can use the hosted iframe embed."
                }
              },
              {
                "@type": "Question",
                "name": "Does it replace tools like Postman or Hoppscotch?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "For documentation workflows, yes. Instead of copying a cURL example into Postman, Swagger, or Hoppscotch, users can authenticate, edit, and send the request directly inside your docs."
                }
              },
              {
                "@type": "Question",
                "name": "Can developers preview code in other languages?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. Xendr can show the same request as cURL and other programming language snippets, so developers can copy code that matches their stack."
                }
              },
              {
                "@type": "Question",
                "name": "Can I document error responses?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. You can add sample responses for different HTTP status codes, including error cases, so users understand what each API response looks like."
                }
              },
              {
                "@type": "Question",
                "name": "Can users import a new cURL request?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes, when cURL import is enabled. Users can paste a new cURL request and turn it into an editable request inside the tester."
                }
              },

                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. You can configure primary color, background, mode, visible snippet languages, default view, imports, and sample responses."
                }
